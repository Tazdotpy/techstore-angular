<div class="login-page">
  <div class="login-card">
    <h1>⚡ TechStore RD</h1>
    <h2>Iniciar Sesión</h2>
    <p class="login-desc">Ingresa para acceder al checkout y tu historial.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nombre">Tu nombre</label>
        <input id="nombre" type="text" formControlName="nombre" class="form-input"
               placeholder="Ej: Juan Pérez"
               [class.error]="f['nombre'].invalid && f['nombre'].touched">
        <span class="error-msg" *ngIf="f['nombre'].invalid && f['nombre'].touched">
          Nombre requerido (mínimo 2 caracteres)
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" class="form-input"
               placeholder="tu@email.com"
               [class.error]="f['email'].invalid && f['email'].touched">
        <span class="error-msg" *ngIf="f['email'].invalid && f['email'].touched">
          Email válido requerido
        </span>
      </div>

      <button type="submit" class="btn-primary-ts btn-block">Entrar</button>
    </form>

    <p class="login-nota">
      Esta es una sesión simulada para demostración. No se almacena ninguna contraseña.
    </p>
  </div>
</div>
